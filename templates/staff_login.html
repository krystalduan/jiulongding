<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLD Staff Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 380px;
            padding: 40px;
        }

        .brand {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #f3f4f6;
        }

        .brand-name {
            font-size: 16px;
            font-weight: 700;
            color: #111827;
            letter-spacing: -0.2px;
        }

        .brand-sub {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        h2 {
            font-size: 20px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 6px;
        }

        .form-description {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }

        input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            color: #111827;
            background: white;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #b91c1c;
            box-shadow: 0 0 0 3px rgba(185, 28, 28, 0.08);
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: #b91c1c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            min-height: 44px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.15s;
        }

        .login-btn:hover { background: #991b1b; }
        .login-btn:active { background: #7f1d1d; }

        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 16px;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            font-size: 13px;
            color: #9ca3af;
            text-decoration: none;
        }

        .back-link a:hover {
            color: #374151;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <div class="brand-name">JiuLongDing</div>
            <div class="brand-sub">Staff Portal</div>
        </div>

        <h2>Sign in</h2>
        <p class="form-description">Enter your staff password to access the dashboard.</p>

        <form action="/staff/login" method="post">
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter staff password" required autofocus>
            </div>
            <button type="submit" class="login-btn">Sign in</button>
        </form>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <div class="back-link">
            <a href="/">Back to customer booking</a>
        </div>
    </div>

    <script>
        console.log('Staff login page loaded');

        function storeAuth(password) {
            const credentials = btoa('staff:' + password);
            sessionStorage.setItem('auth', credentials);
            console.log('Stored auth credentials');
        }

        const originalFetch = window.fetch;
        window.fetch = function(...args) {
            const url = args[0];
            const auth = sessionStorage.getItem('auth');

            if (auth && url.includes('/staff/api/')) {
                if (!args[1]) args[1] = {};
                if (!args[1].headers) args[1].headers = {};
                args[1].headers['Authorization'] = 'Basic ' + auth;
                console.log('Added auth header to API call:', url);
            }

            return originalFetch.apply(this, args);
        };

        if (window.location.pathname.includes('dashboard')) {
            const urlParams = new URLSearchParams(window.location.search);
            const authToken = urlParams.get('auth');
            if (authToken) {
                sessionStorage.setItem('auth', btoa('staff:' + authToken));
            }
        }
    </script>
</body>
</html>
